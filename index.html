<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mines Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body,#root{width:100%;height:100%;overflow:hidden}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useRef,useEffect}=React;


/* ═══════════════════ SHARED ═══════════════════ */
const THEMES = {
  obsidian:{"--bg":"#0B0D12","--bg-surface":"rgba(16,18,26,0.85)","--bg-elevated":"rgba(28,30,42,0.9)","--border":"rgba(255,255,255,0.08)","--border-subtle":"rgba(255,255,255,0.05)","--text-primary":"#E8E8EC","--text-secondary":"#8A8A9C","--text-muted":"#505068","--accent":"#22D67A","--accent-glow":"rgba(34,214,122,0.2)","--accent-soft":"rgba(34,214,122,0.1)","--danger":"#F04858","--danger-glow":"rgba(240,72,88,0.2)","--gold":"#FFD700","--gold-glow":"rgba(255,215,0,0.25)","--gold-soft":"rgba(255,215,0,0.08)","--tile":"rgba(255,255,255,0.07)","--tile-hover":"rgba(255,255,255,0.12)","--tile-border":"rgba(255,255,255,0.1)","--bar-bg":"rgba(10,12,18,0.92)","--ring-track":"rgba(255,255,255,0.08)"},
  ivory:{"--bg":"#EDEAE4","--bg-surface":"rgba(255,255,255,0.85)","--bg-elevated":"rgba(250,250,248,0.9)","--border":"rgba(0,0,0,0.08)","--border-subtle":"rgba(0,0,0,0.05)","--text-primary":"#1A1A1E","--text-secondary":"#6E6E78","--text-muted":"#A0A0A8","--accent":"#1A8C54","--accent-glow":"rgba(26,140,84,0.15)","--accent-soft":"rgba(26,140,84,0.08)","--danger":"#D43848","--danger-glow":"rgba(212,56,72,0.15)","--gold":"#B8960F","--gold-glow":"rgba(184,150,15,0.2)","--gold-soft":"rgba(184,150,15,0.06)","--tile":"rgba(0,0,0,0.04)","--tile-hover":"rgba(0,0,0,0.08)","--tile-border":"rgba(0,0,0,0.08)","--bar-bg":"rgba(255,255,255,0.92)","--ring-track":"rgba(0,0,0,0.08)"},
  midnight:{"--bg":"#080C18","--bg-surface":"rgba(14,22,44,0.85)","--bg-elevated":"rgba(22,32,56,0.9)","--border":"rgba(255,255,255,0.08)","--border-subtle":"rgba(255,255,255,0.05)","--text-primary":"#E0E4F0","--text-secondary":"#6880A8","--text-muted":"#3C5078","--accent":"#4C9EFF","--accent-glow":"rgba(76,158,255,0.2)","--accent-soft":"rgba(76,158,255,0.1)","--danger":"#FF5C6C","--danger-glow":"rgba(255,92,108,0.2)","--gold":"#FFD700","--gold-glow":"rgba(255,215,0,0.25)","--gold-soft":"rgba(255,215,0,0.08)","--tile":"rgba(76,158,255,0.08)","--tile-hover":"rgba(76,158,255,0.15)","--tile-border":"rgba(76,158,255,0.12)","--bar-bg":"rgba(8,12,24,0.92)","--ring-track":"rgba(255,255,255,0.06)"},
};

const MAX_MINES = 24;
const TOWER_LEVELS = [
  { level:1, mines:1, reward:0.5, color:"#4C9EFF" },
  { level:2, mines:2, reward:1, color:"#22D67A" },
  { level:3, mines:3, reward:2, color:"#8BD44A" },
  { level:4, mines:4, reward:4, color:"#D4C44A" },
  { level:5, mines:5, reward:8, color:"#F0A848" },
  { level:6, mines:6, reward:20, color:"#F07848" },
  { level:7, mines:7, reward:50, color:"#F04858" },
  { level:8, mines:8, reward:150, color:"#E020A0" },
];

function getRingColor(m) { const t = m / MAX_MINES; if (t <= 0.2) return "#4C9EFF"; if (t <= 0.35) return "#22D67A"; if (t <= 0.5) return "#8BD44A"; if (t <= 0.65) return "#F0A848"; if (t <= 0.8) return "#F06848"; return "#F04858"; }
function getMultiplier(m, r) { if (r === 0) return 1; let v = 1; for (let i = 0; i < r; i++) v *= (25 - i) / (25 - m - i); return v * 0.97; }
function placeMines25(c) { const p = new Set(); while (p.size < c) p.add(Math.floor(Math.random() * 25)); return p; }
function placeMines9(c) { const p = new Set(); while (p.size < c) p.add(Math.floor(Math.random() * 9)); return p; }
function generatePreview(mines) { const a = Array(25).fill("gem"); const p = new Set(); while (p.size < mines) p.add(Math.floor(Math.random() * 25)); p.forEach(i => { a[i] = "mine"; }); return a; }

/* ─── Shared Icons ─── */
const GemIcon = ({ size = 36 }) => (
  <svg width={size} height={size} viewBox="0 0 32 32" fill="none">
    <path d="M16 3L29 14L16 29L3 14L16 3Z" fill="var(--accent)" opacity="0.9"/>
    <path d="M16 3L29 14L16 16.5L3 14L16 3Z" fill="var(--accent)" opacity="0.55"/>
    <path d="M16 3L9 14H23L16 3Z" fill="white" opacity="0.3"/>
    <path d="M16 16.5L29 14L16 29Z" fill="var(--accent)" opacity="0.45"/>
    <path d="M16 16.5L3 14L16 29Z" fill="var(--accent)" opacity="0.65"/>
  </svg>
);

const MineIcon = ({ size = 34 }) => (
  <svg width={size} height={size} viewBox="0 0 32 32" fill="none">
    <circle cx="16" cy="16" r="9" fill="var(--danger)" opacity="0.9"/>
    <circle cx="16" cy="16" r="5" fill="var(--danger)" opacity="0.45"/>
    {[[16,3,16,9],[16,23,16,29],[3,16,9,16],[23,16,29,16],[7,7,11,11],[21,7,25,11],[7,25,11,21],[21,25,25,21]].map(([x1,y1,x2,y2],i) => (
      <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--danger)" strokeWidth="2" strokeLinecap="round"/>
    ))}
    <circle cx="13" cy="13" r="2.5" fill="white" opacity="0.3"/>
  </svg>
);

const TrophyIcon = ({ size = 18 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
    <path d="M6 9H4a2 2 0 0 1-2-2V5h4M18 9h2a2 2 0 0 0 2-2V5h-4"/>
    <path d="M6 2h12v7a6 6 0 0 1-12 0V2z"/><path d="M9 21h6M12 15v6"/>
  </svg>
);

const SkullIcon = ({ size = 18 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
    <circle cx="12" cy="10" r="7"/><circle cx="9" cy="10" r="1.5" fill="currentColor"/><circle cx="15" cy="10" r="1.5" fill="currentColor"/>
    <path d="M9 17v4M15 17v4M12 17v4"/><path d="M8 17h8"/>
  </svg>
);

const ParticleBurst = ({ color, x, y, count = 12 }) => {
  const pts = useRef(Array.from({ length: count }, (_, i) => ({
    angle: (i / count) * 360 + Math.random() * 20,
    dist: 20 + Math.random() * 40,
    size: 2 + Math.random() * 4,
    delay: Math.random() * 0.08,
  }))).current;
  return (
    <div style={{ position: "absolute", left: x, top: y, pointerEvents: "none", zIndex: 50 }}>
      {pts.map((p, i) => (
        <div key={i} style={{
          position: "absolute", width: p.size, height: p.size, borderRadius: "50%", background: color,
          animation: `pFly 0.7s ${p.delay}s cubic-bezier(.25,.46,.45,.94) forwards`,
          "--px": `${Math.cos(p.angle * Math.PI / 180) * p.dist}px`,
          "--py": `${Math.sin(p.angle * Math.PI / 180) * p.dist}px`,
          opacity: 0,
        }}/>
      ))}
    </div>
  );
};

/* ─── Ring Selector ─── */
const RingSelector = ({ mines, setMines, disabled }) => {
  const pct = mines / MAX_MINES;
  const color = getRingColor(mines);
  const R = 52, C = 2 * Math.PI * R;
  const dashLen = C * pct, gapLen = C - dashLen;
  const segLen = (C / 24) * 0.7, segGap = (C / 24) * 0.3;

  const bS = (ok) => ({
    width: 36, height: 36, borderRadius: "50%", border: "1.5px solid var(--border)",
    background: "var(--tile)", color: "var(--text-secondary)", fontSize: 20, fontWeight: 700,
    fontFamily: "'Outfit',sans-serif", cursor: disabled || !ok ? "not-allowed" : "pointer",
    display: "flex", alignItems: "center", justifyContent: "center",
    transition: "all .15s ease", opacity: disabled || !ok ? 0.3 : 1,
  });

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 14, background: "var(--bg-surface)", backdropFilter: "blur(16px)", border: "1px solid var(--border)", borderRadius: 16, padding: "14px 16px" }}>
      <button onClick={() => !disabled && setMines(Math.max(1, mines - 1))} disabled={disabled || mines <= 1} style={bS(mines > 1)}>−</button>
      <div style={{ position: "relative", width: 128, height: 128, flexShrink: 0 }}>
        <svg width={128} height={128} viewBox="0 0 128 128" style={{ transform: "rotate(-90deg)" }}>
          <circle cx={64} cy={64} r={R} fill="none" stroke="var(--ring-track)" strokeWidth={7} strokeDasharray={`${segLen} ${segGap}`} strokeLinecap="round"/>
          <circle cx={64} cy={64} r={R} fill="none" stroke={color} strokeWidth={7} strokeDasharray={`${dashLen} ${gapLen}`} strokeLinecap="round" style={{ transition: "stroke-dasharray 0.4s cubic-bezier(.34,1.56,.64,1), stroke 0.3s ease", filter: `drop-shadow(0 0 8px ${color}50)` }}/>
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontFamily: "'Outfit',sans-serif", fontSize: 36, fontWeight: 800, color, lineHeight: 1, transition: "color 0.3s ease", textShadow: `0 0 20px ${color}40` }}>{mines}</div>
          <div style={{ fontFamily: "'Outfit',sans-serif", fontSize: 9, fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.12em", marginTop: 2 }}>mines</div>
        </div>
      </div>
      <button onClick={() => !disabled && setMines(Math.min(MAX_MINES, mines + 1))} disabled={disabled || mines >= MAX_MINES} style={bS(mines < MAX_MINES)}>+</button>
    </div>
  );
};


/* ═══════════════════ CLASSIC MODE ═══════════════════ */
const ClassicMode = ({ balance, setBalance }) => {
  const [mines, setMines] = useState(5);
  const [bet, setBet] = useState(2);
  const [gameState, setGameState] = useState("idle");
  const [minePositions, setMinePositions] = useState(new Set());
  const [revealed, setRevealed] = useState(new Set());
  const [particles, setParticles] = useState([]);
  const [shake, setShake] = useState(false);
  const [preview, setPreview] = useState(() => generatePreview(5));
  const [landedCols, setLandedCols] = useState(new Set([0,1,2,3,4]));
  const gridRef = useRef(null);
  const pid = useRef(0);

  const safeTiles = 25 - mines;
  const multiplier = getMultiplier(mines, revealed.size);
  const profit = bet * multiplier - bet;

  useEffect(() => { if (gameState === "idle") setPreview(generatePreview(mines)); }, [mines, gameState]);

  const spawn = (color, idx) => {
    if (!gridRef.current) return;
    const t = gridRef.current.children[idx]; if (!t) return;
    const r = t.getBoundingClientRect(), g = gridRef.current.getBoundingClientRect();
    const id = pid.current++;
    setParticles(p => [...p, { id, color, x: r.left - g.left + r.width / 2, y: r.top - g.top + r.height / 2 }]);
    setTimeout(() => setParticles(p => p.filter(v => v.id !== id)), 900);
  };

  const startGame = useCallback(() => {
    if (bet > balance || gameState !== "idle") return;
    setBalance(b => b - bet);
    setMinePositions(placeMines25(mines));
    setRevealed(new Set()); setParticles([]); setLandedCols(new Set());
    setGameState("transitioning");
    for (let col = 0; col < 5; col++) {
      setTimeout(() => {
        setLandedCols(prev => { const n = new Set(prev); n.add(col); return n; });
        if (col === 4) setTimeout(() => setGameState("active"), 300);
      }, 250 + col * 150);
    }
  }, [bet, balance, mines, gameState]);

  const clickTile = useCallback((idx) => {
    if (gameState !== "active" || revealed.has(idx)) return;
    if (minePositions.has(idx)) {
      setRevealed(prev => new Set([...prev, idx]));
      setGameState("lost"); setShake(true); setTimeout(() => setShake(false), 400);
      spawn("var(--danger)", idx);
    } else {
      const next = new Set([...revealed, idx]); setRevealed(next);
      spawn("var(--accent)", idx);
      if (next.size === safeTiles) { setBalance(b => b + bet * getMultiplier(mines, next.size)); setGameState("won"); }
    }
  }, [gameState, revealed, minePositions, mines, safeTiles, bet]);

  const cashout = useCallback(() => {
    if (gameState !== "active" || revealed.size === 0) return;
    setBalance(b => b + bet * multiplier); setGameState("won");
  }, [gameState, revealed, bet, multiplier]);

  const randomPick = useCallback(() => {
    if (gameState !== "active") return;
    const pool = []; for (let i = 0; i < 25; i++) { if (!revealed.has(i)) pool.push(i); }
    if (pool.length) clickTile(pool[Math.floor(Math.random() * pool.length)]);
  }, [gameState, revealed, clickTile]);

  const reset = () => {
    setGameState("idle"); setRevealed(new Set()); setMinePositions(new Set());
    setParticles([]); setPreview(generatePreview(mines)); setLandedCols(new Set([0,1,2,3,4]));
  };

  const getTileState = (idx) => {
    if (gameState === "lost" && minePositions.has(idx)) return "mine";
    if (revealed.has(idx) && !minePositions.has(idx)) return "gem";
    if (gameState === "won" && minePositions.has(idx)) return "mine-passive";
    return "hidden";
  };

  const isP = gameState === "active", isI = gameState === "idle", isT = gameState === "transitioning", isE = gameState === "won" || gameState === "lost";

  return (
    <>
      <div className="main">
        <div className="left-panel"><RingSelector mines={mines} setMines={setMines} disabled={!isI}/></div>
        {isP && revealed.size > 0 && (
          <div className="multi-display">
            <span className="multi-value">{multiplier.toFixed(2)}×</span>
            <span className="multi-profit">+{profit.toFixed(2)}</span>
          </div>
        )}
        <div className={`grid-wrap ${shake ? "shake" : ""}`}>
          {particles.map(p => <ParticleBurst key={p.id} color={p.color} x={p.x} y={p.y}/>)}
          <div className="grid5" ref={gridRef}>
            {Array.from({ length: 25 }, (_, idx) => {
              const col = idx % 5, row = Math.floor(idx / 5);
              if (isI) {
                const t = preview[idx];
                return (
                  <div key={`p${idx}-${mines}`} className={`tile5 dis prev ${t === "gem" ? "prev-gem" : "prev-mine"}`}>
                    {t === "gem" ? <GemIcon size={32}/> : <MineIcon size={30}/>}
                  </div>
                );
              }
              if (isT) {
                if (landedCols.has(col)) {
                  return <div key={`e${idx}`} className="tile5 dis col-enter" style={{ animationDelay: `${row * 0.05}s` }}/>;
                }
                const t = preview[idx];
                return (
                  <div key={`x${idx}`} className={`tile5 dis col-exit ${t === "gem" ? "prev-gem" : "prev-mine"}`} style={{ animationDelay: `${row * 0.03}s` }}>
                    {t === "gem" ? <GemIcon size={32}/> : <MineIcon size={30}/>}
                  </div>
                );
              }
              const st = getTileState(idx), hidden = st === "hidden", isGem = st === "gem", isMine = st === "mine", isMineP = st === "mine-passive";
              return (
                <div key={idx} className={`tile5 ${isGem ? "gem" : ""} ${isMine ? "mh" : ""} ${isMineP ? "mp" : ""} ${!isP || !hidden ? "dis" : ""}`} onClick={() => hidden && clickTile(idx)}>
                  {isGem && <GemIcon/>}
                  {(isMine || isMineP) && <MineIcon size={isMineP ? 26 : 34}/>}
                </div>
              );
            })}
          </div>
          {isE && (
            <div className="overlay">
              <div className="ov-title" style={{ color: gameState === "won" ? "var(--accent)" : "var(--danger)" }}>{gameState === "won" ? "CASHED OUT" : "MINE HIT"}</div>
              <div className="ov-sub" style={{ color: gameState === "won" ? "var(--accent)" : "var(--danger)" }}>{gameState === "won" ? `+${profit.toFixed(2)} (${multiplier.toFixed(2)}×)` : `-${bet.toFixed(2)}`}</div>
              <button className="ov-btn" onClick={reset}>New Game</button>
            </div>
          )}
        </div>
        <div className="actions">
          <button className="act-btn random" onClick={randomPick} disabled={!isP}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
            Random
          </button>
          <button className="act-btn cashout" onClick={cashout} disabled={!isP || revealed.size === 0}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Cashout
          </button>
        </div>
      </div>
      <div className="bottombar">
        <div className="bb-section">
          <div className="bb-group"><span className="bb-label">Credit</span><span className="bb-val">${balance.toFixed(2)}</span></div>
          <div className="bb-divider"/>
          <div className="bb-group"><span className="bb-label">Bet</span><span className="bb-val">${bet.toFixed(2)}</span></div>
        </div>
        <div className="bet-controls">
          <button className="bet-btn" onClick={() => setBet(b => Math.max(.5, +(b / 2).toFixed(2)))} disabled={!isI}>−</button>
          {isI ? (
            <button className="play-btn" onClick={startGame} disabled={bet > balance}>
              <svg width="24" height="24" viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3" fill="var(--bg)"/></svg>
            </button>
          ) : (
            <div className="live-badge">{isT ? "..." : "LIVE"}</div>
          )}
          <button className="bet-btn" onClick={() => setBet(b => Math.min(balance, +(b * 2).toFixed(2)))} disabled={!isI}>+</button>
        </div>
        <div className="bb-section" style={{ justifyContent: "flex-end" }}>
          <div className="bb-group" style={{ textAlign: "right" }}><span className="bb-label">Next</span><span className="bb-val" style={{ color: "var(--text-secondary)" }}>{isP ? `${getMultiplier(mines, revealed.size + 1).toFixed(2)}×` : "—"}</span></div>
          <div className="bb-divider"/>
          <div className="bb-group" style={{ textAlign: "right" }}><span className="bb-label">Mines</span><span className="bb-val">{mines}</span></div>
        </div>
      </div>
    </>
  );
};


/* ═══════════════════ TOWER SIDEBAR ═══════════════════ */
const TowerSidebar = ({ currentLevel, collectedRewards, gamePhase, bet }) => (
  <div style={{ display: "flex", flexDirection: "column", background: "var(--bg-surface)", backdropFilter: "blur(16px)", border: "1px solid var(--border)", borderRadius: 16, padding: "12px 14px", width: 180 }}>
    <div style={{ fontSize: 10, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'Outfit',sans-serif", marginBottom: 10, textAlign: "center" }}>Tower</div>
    <div style={{ display: "flex", flexDirection: "column-reverse", gap: 4 }}>
      {TOWER_LEVELS.map(lv => {
        const isCur = currentLevel === lv.level && (gamePhase === "playing" || gamePhase === "ready");
        const isClr = collectedRewards.includes(lv.level);
        const isFut = lv.level > currentLevel;
        const isLost = gamePhase === "lost" && currentLevel === lv.level;
        const amt = (lv.reward * bet).toFixed(2);
        return (
          <div key={lv.level} style={{
            display: "flex", alignItems: "center", gap: 8, padding: "7px 10px", borderRadius: 8,
            background: isLost ? "var(--danger-glow)" : isCur ? `${lv.color}18` : isClr ? "var(--accent-soft)" : "transparent",
            border: `1.5px solid ${isLost ? "var(--danger)" : isCur ? lv.color : isClr ? "var(--accent)" : "var(--border-subtle)"}`,
            transition: "all 0.4s cubic-bezier(.34,1.56,.64,1)", opacity: isFut ? 0.3 : 1, transform: isCur ? "scale(1.03)" : "scale(1)",
          }}>
            <div style={{
              width: 26, height: 26, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
              background: isLost ? "var(--danger)" : isClr ? "var(--accent)" : isCur ? lv.color : "var(--bg)",
              border: `1.5px solid ${isLost ? "var(--danger)" : isClr ? "var(--accent)" : isCur ? lv.color : "var(--border)"}`,
              fontFamily: "'Outfit',sans-serif", fontSize: 11, fontWeight: 800,
              color: (isClr || isCur || isLost) ? "var(--bg)" : "var(--text-muted)",
              boxShadow: isCur ? `0 0 12px ${lv.color}40` : "none",
            }}>
              {isLost ? "✕" : isClr ? "✓" : lv.level}
            </div>
            <div style={{ flex: 1, fontSize: 10, fontWeight: 700, color: isLost ? "var(--danger)" : isCur ? lv.color : isClr ? "var(--accent)" : "var(--text-muted)", fontFamily: "'Outfit',sans-serif" }}>
              {lv.mines} mine{lv.mines > 1 ? "s" : ""}
            </div>
            <div style={{ fontSize: 11, fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: isLost ? "var(--danger)" : isClr ? "var(--accent)" : isCur ? lv.color : "var(--text-muted)" }}>
              {isClr ? `+${amt}` : amt}
            </div>
          </div>
        );
      })}
    </div>
  </div>
);


/* ═══════════════════ TOWER MODE ═══════════════════ */
const TowerMode = ({ balance, setBalance }) => {
  const [bet, setBet] = useState(2);
  const [currentLevel, setCurrentLevel] = useState(1);
  const [gamePhase, setGamePhase] = useState("idle");
  const [minePositions, setMinePositions] = useState(new Set());
  const [clickedTile, setClickedTile] = useState(null);
  const [clickedResult, setClickedResult] = useState(null);
  const [revealAll, setRevealAll] = useState(false);
  const [collectedRewards, setCollectedRewards] = useState([]);
  const [totalWon, setTotalWon] = useState(0);
  const [particles, setParticles] = useState([]);
  const [shake, setShake] = useState(false);
  const gridRef = useRef(null);
  const pid = useRef(0);

  const levelData = TOWER_LEVELS[currentLevel - 1];
  const totalPossible = TOWER_LEVELS.reduce((s, l) => s + l.reward * bet, 0);

  const spawn = (color, idx) => {
    if (!gridRef.current) return;
    const t = gridRef.current.children[idx]; if (!t) return;
    const r = t.getBoundingClientRect(), g = gridRef.current.getBoundingClientRect();
    const id = pid.current++;
    setParticles(p => [...p, { id, color, x: r.left - g.left + r.width / 2, y: r.top - g.top + r.height / 2 }]);
    setTimeout(() => setParticles(p => p.filter(v => v.id !== id)), 1000);
  };

  const startCampaign = useCallback(() => {
    if (bet > balance) return;
    setBalance(b => b - bet); setCurrentLevel(1); setCollectedRewards([]); setTotalWon(0);
    setClickedTile(null); setClickedResult(null); setRevealAll(false);
    setMinePositions(placeMines9(TOWER_LEVELS[0].mines)); setGamePhase("ready");
  }, [bet, balance]);

  const setupLevel = useCallback((lvl) => {
    setClickedTile(null); setClickedResult(null); setRevealAll(false);
    setMinePositions(placeMines9(TOWER_LEVELS[lvl - 1].mines)); setGamePhase("ready");
  }, []);

  const clickTile = useCallback((idx) => {
    if (gamePhase !== "ready" || clickedTile !== null) return;
    setClickedTile(idx); setGamePhase("playing");
    if (minePositions.has(idx)) {
      setClickedResult("mine"); setShake(true); setTimeout(() => setShake(false), 400);
      spawn("var(--danger)", idx);
      setTimeout(() => { setRevealAll(true); setGamePhase("lost"); }, 600);
    } else {
      setClickedResult("gem"); spawn(levelData.color, idx);
      const reward = +(levelData.reward * bet).toFixed(2);
      setTimeout(() => {
        setRevealAll(true);
        setCollectedRewards(p => [...p, currentLevel]);
        setTotalWon(p => +(p + reward).toFixed(2));
        setBalance(b => +(b + reward).toFixed(2));
        setGamePhase(currentLevel >= 8 ? "complete" : "won");
      }, 500);
    }
  }, [gamePhase, clickedTile, minePositions, currentLevel, levelData, bet]);

  const continueNext = useCallback(() => { const n = currentLevel + 1; setCurrentLevel(n); setupLevel(n); }, [currentLevel, setupLevel]);
  const resetGame = () => {
    setGamePhase("idle"); setCurrentLevel(1); setCollectedRewards([]); setTotalWon(0);
    setClickedTile(null); setClickedResult(null); setRevealAll(false); setMinePositions(new Set()); setParticles([]);
  };

  const isActive = gamePhase === "ready";

  /* Idle screen */
  if (gamePhase === "idle") {
    return (
      <>
        <div className="main">
          <div className="t-idle">
            <div className="t-idle-title">Climb the<br/><span>Tower</span></div>
            <div className="t-idle-sub">8 levels. Each level adds a mine to a 3×3 grid. One click per level — find a gem to advance, hit a mine and lose your stake.</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
              {TOWER_LEVELS.map(lv => (
                <div key={lv.level} style={{ padding: "4px 10px", borderRadius: 6, fontFamily: "'JetBrains Mono',monospace", fontSize: 11, fontWeight: 600, color: lv.color, background: `${lv.color}10`, border: `1px solid ${lv.color}40` }}>
                  Lv{lv.level}: {lv.reward}×
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="bottombar">
          <div className="bb-section">
            <div className="bb-group"><span className="bb-label">Balance</span><span className="bb-val">${balance.toFixed(2)}</span></div>
            <div className="bb-divider"/>
            <div className="bb-group"><span className="bb-label">Bet</span><span className="bb-val">${bet.toFixed(2)}</span></div>
          </div>
          <div className="bet-controls">
            <button className="bet-btn" onClick={() => setBet(b => Math.max(.5, +(b / 2).toFixed(2)))}>−</button>
            <button className="play-btn" onClick={startCampaign} disabled={bet > balance} style={{ padding: "0 24px", gap: 8 }}>
              <TrophyIcon size={18}/> Start Tower
            </button>
            <button className="bet-btn" onClick={() => setBet(b => Math.min(balance, +(b * 2).toFixed(2)))}>+</button>
          </div>
          <div className="bb-section" style={{ justifyContent: "flex-end" }}>
            <div className="bb-group" style={{ textAlign: "right" }}><span className="bb-label">Max Win</span><span className="bb-val" style={{ color: "var(--gold)" }}>${totalPossible.toFixed(2)}</span></div>
          </div>
        </div>
      </>
    );
  }

  /* Game screen */
  return (
    <>
      <div className="main">
        <TowerSidebar currentLevel={currentLevel} collectedRewards={collectedRewards} gamePhase={gamePhase} bet={bet}/>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: "'Outfit',sans-serif", fontSize: 14, fontWeight: 700, padding: "8px 20px", borderRadius: 10, background: "var(--bg-surface)", border: "1px solid var(--border)", backdropFilter: "blur(16px)" }}>
            <span style={{ color: "var(--text-muted)" }}>Level</span>
            <span style={{ fontSize: 18, fontWeight: 800, color: levelData.color }}>{currentLevel}</span>
            <span style={{ color: "var(--text-muted)", fontSize: 12 }}>•</span>
            <span style={{ fontSize: 12, color: "var(--danger)" }}>{levelData.mines} mine{levelData.mines > 1 ? "s" : ""}</span>
            <span style={{ color: "var(--text-muted)", fontSize: 12 }}>•</span>
            <span style={{ fontSize: 12, color: levelData.color, fontFamily: "'JetBrains Mono',monospace", fontWeight: 700 }}>+{(levelData.reward * bet).toFixed(2)}</span>
          </div>
          <div className={`grid-wrap ${shake ? "shake" : ""}`}>
            {particles.map(p => <ParticleBurst key={p.id} color={p.color} x={p.x} y={p.y} count={16}/>)}
            <div className="grid3" ref={gridRef}>
              {Array.from({ length: 9 }, (_, idx) => {
                const isMine = minePositions.has(idx);
                const isClicked = clickedTile === idx;
                const show = isClicked || revealAll;
                let cls = "tile3";
                if (!isActive && !show) cls += " dis";
                if (isClicked && clickedResult === "gem") cls += " gem";
                if (isClicked && clickedResult === "mine") cls += " mine-hit";
                if (revealAll && !isClicked && isMine) cls += " mine-reveal dis";
                if (revealAll && !isClicked && !isMine) cls += " safe-reveal dis";
                if (!show && !isActive) cls += " dis";
                return (
                  <div key={`${currentLevel}-${idx}`} className={cls} onClick={() => isActive && clickTile(idx)}>
                    {show && isMine && <MineIcon size={isClicked ? 38 : 28}/>}
                    {show && !isMine && <GemIcon size={isClicked ? 40 : 28}/>}
                  </div>
                );
              })}
            </div>
          </div>
          {isActive && (
            <div style={{ fontSize: 13, color: "var(--text-secondary)", fontFamily: "'Outfit',sans-serif", fontWeight: 600 }}>
              Pick a tile — {9 - levelData.mines} safe, {levelData.mines} mine{levelData.mines > 1 ? "s" : ""}
            </div>
          )}
        </div>
        <div style={{ width: 200, display: "flex", alignItems: "center", justifyContent: "center" }}>
          {gamePhase === "won" && (
            <div className="result-panel">
              <div className="rp-title" style={{ color: levelData.color }}>Level {currentLevel} Clear!</div>
              <div className="rp-amount" style={{ color: "var(--accent)" }}>+{(levelData.reward * bet).toFixed(2)}</div>
              <div className="rp-sub">Total earned: ${totalWon.toFixed(2)}</div>
              <button className="c-btn primary" onClick={continueNext}>Next Level →</button>
              <button className="c-btn secondary" onClick={() => setGamePhase("cashout")}>Cash Out ${totalWon.toFixed(2)}</button>
            </div>
          )}
          {gamePhase === "lost" && (
            <div className="result-panel">
              <div className="rp-title" style={{ color: "var(--danger)" }}>Game Over</div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, color: "var(--danger)" }}>
                <SkullIcon size={20}/><span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 16, fontWeight: 700 }}>-${bet.toFixed(2)}</span>
              </div>
              <div className="rp-sub">{totalWon > 0 ? `You kept $${totalWon.toFixed(2)}` : "Stake lost"}</div>
              <button className="c-btn danger" onClick={resetGame}>Try Again</button>
            </div>
          )}
          {gamePhase === "complete" && (
            <div className="result-panel">
              <div style={{ fontSize: 32 }}>🏆</div>
              <div className="rp-title" style={{ color: "var(--gold)" }}>Tower Complete!</div>
              <div className="rp-amount" style={{ color: "var(--gold)" }}>${totalWon.toFixed(2)}</div>
              <button className="c-btn gold" onClick={resetGame}>Play Again</button>
            </div>
          )}
          {gamePhase === "cashout" && (
            <div className="result-panel">
              <div className="rp-title" style={{ color: "var(--accent)" }}>Cashed Out</div>
              <div className="rp-amount" style={{ color: "var(--accent)" }}>${totalWon.toFixed(2)}</div>
              <button className="c-btn primary" onClick={resetGame}>Play Again</button>
            </div>
          )}
        </div>
      </div>
      <div className="bottombar">
        <div className="bb-section">
          <div className="bb-group"><span className="bb-label">Balance</span><span className="bb-val">${balance.toFixed(2)}</span></div>
          <div className="bb-divider"/>
          <div className="bb-group"><span className="bb-label">Stake</span><span className="bb-val">${bet.toFixed(2)}</span></div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div className="bb-group" style={{ textAlign: "center" }}>
            <span className="bb-label">Won</span>
            <span className="bb-val" style={{ color: totalWon > 0 ? "var(--accent)" : "var(--text-primary)" }}>${totalWon.toFixed(2)}</span>
          </div>
        </div>
        <div className="bb-section" style={{ justifyContent: "flex-end" }}>
          <div className="bb-group" style={{ textAlign: "right" }}><span className="bb-label">Level</span><span className="bb-val" style={{ color: levelData.color }}>{currentLevel}/8</span></div>
          <div className="bb-divider"/>
          <div className="bb-group" style={{ textAlign: "right" }}><span className="bb-label">Reward</span><span className="bb-val" style={{ color: levelData.color }}>{levelData.reward}×</span></div>
        </div>
      </div>
    </>
  );
};

    .rp-amount{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700}
    .rp-sub{font-size:12px;color:var(--text-secondary)}
    .c-btn{padding:10px 24px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s ease;width:100%;text-align:center}
    .c-btn:hover{transform:translateY(-2px)}
    .c-btn.primary{background:var(--accent);color:var(--bg);box-shadow:0 4px 16px var(--accent-glow)}
    .c-btn.secondary{background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border)}
    .c-btn.gold{background:var(--gold);color:#1a1a1e;box-shadow:0 4px 16px var(--gold-glow)}
    .c-btn.danger{background:var(--bg-elevated);color:var(--danger);border:1px solid var(--danger)}
  `;

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="topbar">
          <div className="logo">M<span>I</span>NES</div>
          <div className="mode-toggle">
            <button className={`mode-btn ${mode === "classic" ? "active" : ""}`} onClick={() => setMode("classic")}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
              Classic
            </button>
            <button className={`mode-btn ${mode === "tower" ? "tower-active" : ""}`} onClick={() => setMode("tower")}>
              <TrophyIcon size={14}/>
              Tower
            </button>
          </div>
          <div className="themes">
            {Object.entries({ obsidian: "#0B0D12", ivory: "#EDEAE4", midnight: "#080C18" }).map(([k, c]) => (
              <div key={k} className={`tdot ${theme === k ? "a" : ""}`} style={{ background: c, border: k === "ivory" ? "2px solid #bbb" : undefined }} onClick={() => setTheme(k)}/>
            ))}
          </div>
        </div>
        {mode === "classic"
          ? <ClassicMode balance={balance} setBalance={setBalance}/>
          : <TowerMode balance={balance} setBalance={setBalance}/>
        }
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(MinesApp));
</script>
</body>
</html>
